<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#111111',
                            accent: '#8E8E8E',
                            green: '#222222',
                            light: '#F8F9FA',
                            gray: '#E9ECEF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .hero-bg {
            background-color: #F8F9FA;
            background-image: 
                radial-gradient(at 80% 0%, hsla(82, 16%, 86%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(82, 16%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(82, 16%, 80%, 0.5) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(0, 0%, 100%, 1) 0px, transparent 50%);
        }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }

<body class="bg-brand-light text-brand-dark font-sans antialiased min-h-screen flex flex-col justify-between hero-bg">

    <header class="w-full py-6 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-1.5 sm:gap-3 transition-all duration-300">

                <span class="h-4 sm:h-5 w-px bg-gray-200 inline-block"></span>
                <span class="inline-block text-[9px] sm:text-xs font-bold uppercase tracking-wider sm:tracking-widest text-gray-400 px-2 py-1 sm:px-3.5 sm:py-1.5 rounded-full transition-all duration-300">Teambuilding</span>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-md w-full text-center glass p-10 rounded-[2.5rem] shadow-2xl border border-white/60 relative overflow-hidden select-none">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-brand-accent/20 rounded-full blur-3xl pointer-events-none"></div>
            
            <span class="text-9xl font-black font-heading text-transparent bg-clip-text bg-gradient-to-r from-brand-dark to-brand-accent mb-4 block leading-none">404</span>
            
            <h1 class="font-heading text-2xl md:text-3xl font-black mb-4 tracking-tight">Stránka nebola nájdená</h1>
            
            <p class="text-gray-600 text-sm md:text-base mb-8 leading-relaxed">
                Ľutujeme, ale požadovaná stránka neexistuje alebo bola presunutá. Skontrolujte prosím adresu alebo sa vráťte na úvodnú stránku.
            </p>
            
            <a href="index.html" class="inline-block bg-brand-dark text-white px-8 py-4 rounded-full font-bold uppercase tracking-wider hover:bg-black transition duration-300 shadow-lg hover:shadow-2xl transform hover:-translate-y-0.5 w-full sm:w-auto">
                Späť na úvod
            </a>
        </div>
    </main>

    <footer class="w-full py-8 text-center text-xs text-gray-400 uppercase tracking-widest font-bold">
        <span>© 2026 VELOCITY</span>
    </footer>
